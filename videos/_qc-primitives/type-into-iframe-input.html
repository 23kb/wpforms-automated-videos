<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>typeIntoIframeInput — QC</title>
<link rel="stylesheet" href="/videos/_qc-interactions/_shell.css">
<style>
  .mirror {
    position: absolute; left: 24px; bottom: 20px; z-index: 20;
    background: rgba(255,255,255,0.92); color: #1c1f28;
    border: 1px solid rgba(28,31,40,0.12); border-radius: 8px;
    padding: 10px 14px; font-family: ui-monospace, monospace; font-size: 13px;
    box-shadow: 0 12px 28px rgba(0,0,0,0.12);
  }
  .controls select {
    background: rgba(255,255,255,0.08);
    color: #ebebed;
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 6px;
    height: 34px;
    padding: 0 10px;
    font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
</style>
</head>
<body>
<div class="header">
  <h1>typeIntoIframeInput</h1>
  <div class="desc">
    Types into a real iframe <code>&lt;input&gt;</code> and fires <code>input</code> listeners every character.
    The mirror below updates only from the input event listener. Source:
    <a href="/videos/_shared/motion-primitives.js">motion-primitives.js</a> ·
    <a href="index.html">← back to index</a>
  </div>
</div>

<div class="stage-wrap">
  <div class="stage" id="stage">
    <div class="phase-label" id="phaseLabel">state: loading…</div>
    <div class="mirror" id="mirror">input events: 0 · value: ""</div>
  </div>
</div>

<div class="controls">
  <select id="fieldPicker">
    <option value="48|Full Name">Name → Full Name</option>
    <option value="49|Work Email">Email → Work Email</option>
    <option value="50|Project Brief">Paragraph Text → Project Brief</option>
    <option value="6|Preferred Contact Method">Multiple Choice → Preferred Contact Method</option>
    <option value="7|Newsletter Topics">Checkboxes → Newsletter Topics</option>
    <option value="10|Mobile Number">Phone → Mobile Number</option>
  </select>
  <button id="runBtn" class="primary">▶ type selected field</button>
  <button id="resetBtn">⟲ reset</button>
  <span class="time" id="timeLabel">…</span>
</div>

<script src="/vendor/gsap/3.15.0/gsap.min.js"></script>
<script type="module">
import { bootQc } from '/videos/_qc-interactions/_shell.js';
import { typeIntoIframeInput } from '/videos/_shared/motion-primitives.js';

let eventCount = 0;
let activeInput = null;
const mirror = document.getElementById('mirror');
const picker = document.getElementById('fieldPicker');

function setMirror(fieldId, value) {
  mirror.textContent = `field ${fieldId} · input events: ${eventCount} · value: "${value}"`;
}

function splitPickedField() {
  const [fieldId, text] = picker.value.split('|');
  return { fieldId, text };
}

bootQc({
  startSnapshot: 'builder-fields',
  cursorStart: { x: 1120, y: 650 },
  onReady: async ({ interactions }) => {
    eventCount = 0;
    activeInput = null;
    const { fieldId } = splitPickedField();
    setMirror(fieldId, '');
    interactions.iframe.doc()?.addEventListener('input', (event) => {
      if (event.target !== activeInput) return;
      eventCount += 1;
      const fieldId = activeInput.id.match(/wpforms-field-option-(\d+)-label/)?.[1] || '?';
      setMirror(fieldId, activeInput.value);
    });
  },
  run: async ({ interactions, setState }) => {
    const { fieldId, text } = splitPickedField();
    setState(`opening field ${fieldId} options`);
    await interactions.openFieldOptions(fieldId, { ripple: false });
    const input = interactions.iframe.query(`#wpforms-field-option-${CSS.escape(fieldId)}-label`);
    if (!input) throw new Error(`Label input not found for field ${fieldId}`);
    const canvasLabel = interactions.iframe.query(`#wpforms-field-${CSS.escape(fieldId)} .label-title .text`);
    activeInput = input;
    eventCount = 0;
    setMirror(fieldId, input.value || '');
    input.addEventListener('input', () => {
      if (canvasLabel) canvasLabel.textContent = input.value;
    }, { once: false });
    setState(`typing "${text}" into field ${fieldId}`);
    const pt = interactions.iframe.elementToStageCoords(input);
    await interactions.cursor.glide(pt, { duration: 0.65 });
    await interactions.cursor.click({ ripple: false });
    await new Promise(resolve => {
      const tween = typeIntoIframeInput(input, text, { cps: 8, clear: true });
      tween.eventCallback('onComplete', resolve);
    });
    setState('typed and dispatched change');
  },
});
</script>
</body>
</html>
