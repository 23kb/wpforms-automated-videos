<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cursor.glide({ via }) — QC</title>
<style>
  :root {
    --bg: #14161C; --ink: #ebebed; --ink-mute: #8a8e99;
    --accent: #E27730; --accent-blue: #0399ED; --bg-warm: #F4F1EC;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; overflow: hidden; }
  .header { padding: 16px 32px; border-bottom: 1px solid #2a2e3a; }
  .header h1 { margin: 0 0 4px; font-size: 18px; font-family: ui-monospace, "SF Mono", Menlo, monospace; color: var(--accent-blue); }
  .header .desc { font-size: 13px; color: var(--ink-mute); }
  .header a { color: var(--accent); text-decoration: none; font-size: 12px; }
  .stage-wrap { position: fixed; inset: 78px 0 80px 0; display: flex; align-items: center; justify-content: center; background: #0d0e10; }
  .stage { position: relative; width: 1280px; height: 720px; background: var(--bg-warm); overflow: hidden; border-radius: 6px; box-shadow: 0 30px 80px rgba(0,0,0,0.45); transform-origin: center center; }
  .button-row { position: absolute; inset: 0; display: flex; align-items: center; justify-content: space-around; padding: 0 130px; }
  .target {
    width: 210px; height: 92px; border: 0; border-radius: 8px; color: #fff;
    font-size: 18px; font-weight: 700; box-shadow: 0 18px 40px rgba(25, 28, 35, 0.18);
  }
  .target.a { background: #596172; }
  .target.b { background: var(--accent); }
  .target.c { background: var(--accent-blue); }
  .waypoint {
    position: absolute; width: 14px; height: 14px; margin: -7px 0 0 -7px;
    border: 2px solid var(--accent); border-radius: 50%; opacity: 0; pointer-events: none;
  }
  .waypoint.on { opacity: 1; }
  .phase-label { position: absolute; left: 24px; bottom: 20px; padding: 6px 12px; border-radius: 999px; background: rgba(255,255,255,0.88); color: #454b57; font-family: ui-monospace, monospace; font-size: 13px; }
  .controls { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 32px; background: rgba(20,22,28,0.92); backdrop-filter: blur(8px); display: flex; align-items: center; gap: 12px; border-top: 1px solid #2a2e3a; }
  .controls button { background: rgba(255,255,255,0.10); border: 0; color: var(--ink); min-width: 36px; height: 34px; border-radius: 999px; cursor: pointer; font-size: 13px; padding: 0 14px; }
  .controls button.primary { background: var(--accent); color: #fff; }
  .controls button:hover { background: rgba(255,255,255,0.20); }
  .controls button.primary:hover { background: #c96428; }
</style>
</head>
<body>
<div class="header">
  <h1>Cursor.glide({ via })</h1>
  <div class="desc">
    Compare straight cursor movement with one-waypoint curved arcs. Source:
    <a href="/videos/_shared/motion-primitives.js">motion-primitives.js</a> ·
    <a href="index.html">← back to index</a>
  </div>
</div>

<div class="stage-wrap">
  <div class="stage" id="stage">
    <div class="button-row">
      <button class="target a">Start</button>
      <button class="target b">Target</button>
      <button class="target c">Compare</button>
    </div>
    <div class="waypoint" id="waypoint"></div>
    <div class="phase-label" id="phaseLabel">state: ready</div>
  </div>
</div>

<div class="controls">
  <button class="primary" id="straightBtn">Without via</button>
  <button id="aboveBtn">With via above target</button>
  <button id="belowBtn">With via below target</button>
  <button id="resetBtn">Reset</button>
</div>

<script src="/vendor/gsap/3.15.0/gsap.min.js"></script>
<script type="module">
import { Cursor } from '/videos/_shared/motion-primitives.js';

const stage = document.getElementById('stage');
const label = document.getElementById('phaseLabel');
const waypoint = document.getElementById('waypoint');
const start = { x: 242, y: 360 };
const target = { x: 640, y: 360 };
const above = { x: 515, y: 185 };
const below = { x: 515, y: 545 };
const cursor = new Cursor(stage, { initialX: start.x, initialY: start.y });

function fitStage() {
  const wrap = document.querySelector('.stage-wrap');
  const sx = wrap.clientWidth / 1280;
  const sy = wrap.clientHeight / 720;
  stage.style.transform = `scale(${Math.min(sx, sy) * 0.96})`;
}
fitStage();
window.addEventListener('resize', fitStage);

function showWaypoint(pt) {
  if (!pt) {
    waypoint.classList.remove('on');
    return;
  }
  waypoint.style.left = pt.x + 'px';
  waypoint.style.top = pt.y + 'px';
  waypoint.classList.add('on');
}

async function run(name, via) {
  label.textContent = `state: ${name}`;
  showWaypoint(via);
  cursor.setPos(start.x, start.y);
  await cursor.glide(target, { via, duration: 1.15 });
  await cursor.click();
  label.textContent = `state: complete — ${name}`;
}

document.getElementById('straightBtn').addEventListener('click', () => run('straight glide', null));
document.getElementById('aboveBtn').addEventListener('click', () => run('via above', above));
document.getElementById('belowBtn').addEventListener('click', () => run('via below', below));
document.getElementById('resetBtn').addEventListener('click', () => {
  showWaypoint(null);
  cursor.setPos(start.x, start.y);
  label.textContent = 'state: ready';
});
</script>
</body>
</html>
