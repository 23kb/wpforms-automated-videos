<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>cameraToElement — QC</title>
<link rel="stylesheet" href="/videos/_qc-interactions/_shell.css">
<style>
  .scene-camera { position: absolute; inset: 0; transform-origin: center center; will-change: transform; }
  .stage .phase-label { z-index: 30; }
</style>
</head>
<body>
<div class="header">
  <h1>cameraToElement</h1>
  <div class="desc">
    Computes a camera pose from a real iframe element, then flies to it with <code>cinematicFlight</code>.
    Source: <a href="/videos/_shared/motion-primitives.js">motion-primitives.js</a> ·
    <a href="index.html">← back to index</a>
  </div>
</div>

<div class="stage-wrap">
  <div class="stage" id="stage">
    <div class="scene-camera" id="camera"></div>
    <div class="phase-label" id="phaseLabel">state: loading…</div>
  </div>
</div>

<div class="controls">
  <button class="primary" data-target=".wpforms-field[data-field-id='48']">Name field</button>
  <button data-target=".wpforms-field[data-field-id='49']">Email field</button>
  <button data-target=".wpforms-field[data-field-id='50']">Paragraph field</button>
  <button id="resetBtn">Reset</button>
  <span class="time" id="timeLabel">…</span>
</div>

<script src="/vendor/gsap/3.15.0/gsap.min.js"></script>
<script type="module">
import { cinematicFlight, cameraToElement } from '/videos/_shared/motion-primitives.js';
import { IframeManager } from '/videos/_shared/wpforms-interactions.js';

const stage = document.getElementById('stage');
const camera = document.getElementById('camera');
const label = document.getElementById('phaseLabel');
const timeLabel = document.getElementById('timeLabel');
const ifm = new IframeManager(camera);
let currentPose = { x: 0, y: 0, scale: 1, rotation: 0 };

function fitStage() {
  const wrap = document.querySelector('.stage-wrap');
  const sx = wrap.clientWidth / 1280;
  const sy = wrap.clientHeight / 720;
  stage.style.transform = `scale(${Math.min(sx, sy) * 0.96})`;
}
fitStage();
window.addEventListener('resize', fitStage);

label.textContent = 'state: loading builder-fields';
await ifm.load('builder-fields');
label.textContent = 'state: ready';
timeLabel.textContent = 'idle';

async function flyTo(selector) {
  const el = ifm.query(selector);
  if (!el) throw new Error(`selector not found: ${selector}`);
  el.scrollIntoView({ block: 'center', behavior: 'instant' });
  await new Promise(resolve => gsap.delayedCall(0.15, resolve));
  const to = cameraToElement(ifm, selector, { fill: 0.54, pad: 28 });
  label.textContent = `state: flying to ${selector}`;
  const tl = cinematicFlight(camera, {
    from: currentPose,
    to,
    anticipationDuration: 0.12,
    flightDuration: 0.72,
    landHold: 0.25,
    scaleDipFactor: 0.92,
    rotationTilt: 0.4,
  });
  tl.eventCallback('onUpdate', () => {
    timeLabel.textContent = `${tl.time().toFixed(2)} / ${tl.duration().toFixed(2)}`;
  });
  await new Promise(resolve => {
    tl.eventCallback('onComplete', resolve);
    tl.play(0);
  });
  currentPose = { ...to, rotation: 0 };
  label.textContent = 'state: complete';
}

document.querySelectorAll('[data-target]').forEach(btn => {
  btn.addEventListener('click', () => {
    flyTo(btn.dataset.target).catch(err => {
      console.error(err);
      label.textContent = 'state: error: ' + err.message;
    });
  });
});

document.getElementById('resetBtn').addEventListener('click', () => {
  gsap.killTweensOf(camera);
  currentPose = { x: 0, y: 0, scale: 1, rotation: 0 };
  gsap.to(camera, { ...currentPose, duration: 0.35, ease: 'power2.out' });
  label.textContent = 'state: reset';
  timeLabel.textContent = 'idle';
});
</script>
</body>
</html>
