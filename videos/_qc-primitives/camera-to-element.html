<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>cameraToElement — QC</title>
<link rel="stylesheet" href="/videos/_qc-interactions/_shell.css">
<style>
  .stage .phase-label { z-index: 40; }
  .controls {
    align-items: flex-start;
    gap: 14px;
  }
  .control-group {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
  }
  .group-label {
    width: 100%;
    color: #64748b;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .target-reticle {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 18px;
    height: 18px;
    margin: -9px 0 0 -9px;
    border: 2px solid #E27730;
    border-radius: 999px;
    z-index: 35;
    pointer-events: none;
    box-shadow: 0 0 0 5px rgba(226,119,48,0.16);
  }
  .target-reticle::before,
  .target-reticle::after {
    content: "";
    position: absolute;
    background: #E27730;
  }
  .target-reticle::before { left: -18px; right: -18px; top: 7px; height: 2px; }
  .target-reticle::after { top: -18px; bottom: -18px; left: 7px; width: 2px; }
</style>
</head>
<body>
<div class="header">
  <h1>cameraToElement</h1>
  <div class="desc">
    Same-snapshot camera push-in: click a field and the camera moves into that exact field, landing its center on the stage reticle.
    Source: <a href="/videos/_shared/motion-primitives.js">motion-primitives.js</a> ·
    <a href="index.html">← back to index</a>
  </div>
</div>

<div class="stage-wrap">
  <div class="stage" id="stage">
    <div class="target-reticle" aria-hidden="true"></div>
    <div class="phase-label" id="phaseLabel">state: loading…</div>
  </div>
</div>

<div class="controls">
  <div class="control-group">
    <span class="group-label">Builder canvas</span>
    <button class="primary" data-snapshot="builder-fields" data-target=".wpforms-field[data-field-id='48']">Name field</button>
    <button data-snapshot="builder-fields" data-target=".wpforms-field[data-field-id='49']">Email field</button>
    <button data-snapshot="builder-fields" data-target=".wpforms-field[data-field-id='50']">Paragraph field</button>
    <button data-snapshot="builder-fields" data-target=".wpforms-field[data-field-id='7']">Checkboxes field</button>
  </div>
  <div class="control-group">
    <span class="group-label">Admin entries</span>
    <button data-snapshot="admin-entries-list" data-view-only="true">Entries default</button>
    <button data-snapshot="admin-entries-list" data-target="#wpforms-entries-search-input">Search input</button>
    <button data-snapshot="admin-entries-list" data-target="#the-list tr:nth-child(1) [data-field-type='name']">Entry name</button>
    <button data-snapshot="admin-entries-list" data-target="#the-list tr:nth-child(3) [data-field-type='email']">Entry email</button>
    <button data-snapshot="admin-entries-list" data-target="#the-list tr:nth-child(5) [data-field-type='textarea']">Entry message</button>
    <button data-snapshot="admin-entries-list" data-target="#the-list tr:nth-child(1) .actions">Row actions</button>
  </div>
  <button id="resetBtn">Reset</button>
  <span class="time" id="timeLabel">…</span>
</div>

<script src="/vendor/gsap/3.15.0/gsap.min.js"></script>
<script type="module">
import { cameraToElement } from '/videos/_shared/motion-primitives.js';
import { IframeManager } from '/videos/_shared/wpforms-interactions.js';

const STAGE_W = 1280;
const STAGE_H = 720;

const stage = document.getElementById('stage');
const label = document.getElementById('phaseLabel');
const timeLabel = document.getElementById('timeLabel');
const ifm = new IframeManager(stage);

function fitStage() {
  const wrap = document.querySelector('.stage-wrap');
  const sx = wrap.clientWidth / STAGE_W;
  const sy = wrap.clientHeight / STAGE_H;
  stage.style.transform = `scale(${Math.min(sx, sy) * 0.96})`;
}
fitStage();
window.addEventListener('resize', fitStage);

label.textContent = 'state: loading builder-fields';
await ifm.load('builder-fields');
label.textContent = 'state: ready';
timeLabel.textContent = 'idle';

function resetCamera(duration = 0.35) {
  return ifm.resetCamera({ duration });
}

async function ensureSnapshot(slug) {
  if (ifm.currentSlug() === slug) return;
  label.textContent = `state: loading ${slug}`;
  await resetCamera(0.22);
  await ifm.swap(slug, { duration: 0.28 });
  const win = ifm.iframe()?.contentWindow;
  if (win) win.scrollTo(0, 0);
}

async function moveIntoField(snapshot, selector) {
  await ensureSnapshot(snapshot);
  const el = ifm.query(selector);
  if (!el) throw new Error(`selector not found: ${selector}`);
  label.textContent = `state: smooth scroll to ${selector}`;
  await ifm.smoothScrollIntoView(el, {
    block: 'center',
    inline: 'center',
    duration: 0.64,
    ease: 'power2.out',
  });
  const pose = cameraToElement(ifm, selector, {
    fill: 0.76,
    pad: 12,
    minZoom: 1,
    maxZoom: 3.8,
  });
  label.textContent = `state: moving into ${selector}`;
  await ifm.tweenCamera({
    ...pose,
    duration: 0.82,
    ease: 'power3.out',
    onUpdate: (state) => {
      timeLabel.textContent = `zoom ${state.zoom.toFixed(2)}x · tx ${Math.round(state.tx)} · ty ${Math.round(state.ty)}`;
    },
  });
  label.textContent = 'state: complete';
}

document.querySelectorAll('[data-target]').forEach(btn => {
  btn.addEventListener('click', () => {
    moveIntoField(btn.dataset.snapshot || 'builder-fields', btn.dataset.target).catch(err => {
      console.error(err);
      label.textContent = 'state: error: ' + err.message;
    });
  });
});

document.querySelectorAll('[data-view-only]').forEach(btn => {
  btn.addEventListener('click', async () => {
    try {
      await ensureSnapshot(btn.dataset.snapshot || 'builder-fields');
      await resetCamera();
      label.textContent = `state: ${btn.textContent.trim()} ready`;
      timeLabel.textContent = 'zoom 1.00x';
    } catch (err) {
      console.error(err);
      label.textContent = 'state: error: ' + err.message;
    }
  });
});

document.getElementById('resetBtn').addEventListener('click', async () => {
  await resetCamera();
  label.textContent = 'state: reset';
  timeLabel.textContent = 'idle';
});
</script>
</body>
</html>
