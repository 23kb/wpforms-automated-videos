<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>narration.js — QC</title>
<style>
  :root { --bg:#14161C; --ink:#ebebed; --muted:#8a8e99; --accent:#E27730; --blue:#0399ED; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; overflow: hidden; }
  .header { padding: 16px 32px; border-bottom: 1px solid #2a2e3a; }
  .header h1 { margin: 0 0 4px; font-size: 18px; font-family: ui-monospace, "SF Mono", Menlo, monospace; color: var(--blue); }
  .header .desc { font-size: 13px; color: var(--muted); }
  .header a { color: var(--accent); text-decoration: none; font-size: 12px; }
  .stage-wrap { position: fixed; inset: 78px 0 80px 0; display: flex; align-items: center; justify-content: center; background: #0d0e10; }
  .stage { position: relative; width: 1280px; height: 720px; background: #F4F1EC; overflow: hidden; border-radius: 6px; box-shadow: 0 30px 80px rgba(0,0,0,0.45); transform-origin: center center; display: grid; place-items: center; }
  .panel { width: 560px; background: #fff; color: #1c1f28; border: 1px solid rgba(28,31,40,0.08); border-radius: 8px; padding: 28px; box-shadow: 0 20px 48px rgba(20,22,28,0.16); }
  .panel h2 { margin: 0 0 14px; font-size: 24px; }
  .meter { height: 10px; border-radius: 999px; overflow: hidden; background: #e8eaf0; margin: 16px 0; }
  .meter span { display: block; width: 100%; height: 100%; background: var(--accent); transform: scaleX(0.3); transform-origin: left center; }
  .log { min-height: 90px; font-family: ui-monospace, monospace; font-size: 13px; line-height: 1.65; color: #4b5363; white-space: pre-line; }
  .controls { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 32px; background: rgba(20,22,28,0.92); backdrop-filter: blur(8px); display: flex; align-items: center; gap: 12px; border-top: 1px solid #2a2e3a; }
  .controls button { background: rgba(255,255,255,0.10); border: 0; color: var(--ink); min-width: 36px; height: 34px; border-radius: 999px; cursor: pointer; font-size: 13px; padding: 0 14px; }
  .controls button.primary { background: var(--accent); color: #fff; }
  .controls button:hover { background: rgba(255,255,255,0.20); }
</style>
</head>
<body>
<div class="header">
  <h1>narration.js</h1>
  <div class="desc">
    Starts BGM, plays two narration clips, ducks while narration is active, then restores.
    Source: <a href="/videos/_shared/narration.js">narration.js</a> ·
    <a href="index.html">← back to index</a>
  </div>
</div>

<div class="stage-wrap">
  <div class="stage" id="stage">
    <div class="panel">
      <h2>Portable narration + BGM duck</h2>
      <div class="meter"><span id="meter"></span></div>
      <div class="log" id="log">ready</div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="primary" id="runBtn">▶ run duck demo</button>
  <button id="pauseBtn">pause</button>
  <button id="resumeBtn">resume</button>
  <button id="cleanupBtn">cleanup</button>
</div>

<script src="/vendor/gsap/3.15.0/gsap.min.js"></script>
<script type="module">
import { startBGM, stopBGM, playNarration, loadNarrationManifest, cleanupAudio } from '/videos/_shared/narration.js';

const stage = document.getElementById('stage');
const meter = document.getElementById('meter');
const log = document.getElementById('log');

function fitStage() {
  const wrap = document.querySelector('.stage-wrap');
  const sx = wrap.clientWidth / 1280;
  const sy = wrap.clientHeight / 720;
  stage.style.transform = `scale(${Math.min(sx, sy) * 0.96})`;
}
fitStage();
window.addEventListener('resize', fitStage);

function note(line) {
  log.textContent += `\n${line}`;
}

document.getElementById('runBtn').addEventListener('click', async () => {
  log.textContent = 'loading optional narration manifest...';
  const manifest = await loadNarrationManifest('make-field-required');
  note(`manifest: ${manifest ? 'found' : 'not present, using mp3 keys directly'}`);
  note('starting BGM at 0.30');
  await startBGM('/bgms/1.mp3', { volume: 0.3, fadeIn: 800 });
  gsap.to(meter, { scaleX: 1, duration: 0.8, ease: 'sine.inOut' });
  note('playing clip 1, BGM ducks');
  gsap.to(meter, { scaleX: 0.18, duration: 0.18, ease: 'sine.inOut' });
  await playNarration('make-field-required', 'find-field-setting', { keepDucked: true });
  note('playing clip 2, BGM stays ducked between clips');
  await playNarration('make-field-required', 'toggle-required');
  note('narration complete, BGM restores slowly');
  gsap.to(meter, { scaleX: 1, duration: 3.5, ease: 'sine.inOut' });
});

document.getElementById('pauseBtn').addEventListener('click', () => {
  window.gsap?.globalTimeline?.pause();
  note('paused GSAP global timeline');
});

document.getElementById('resumeBtn').addEventListener('click', () => {
  window.gsap?.globalTimeline?.resume();
  note('resumed GSAP global timeline');
});

document.getElementById('cleanupBtn').addEventListener('click', async () => {
  await cleanupAudio();
  await stopBGM({ fadeOut: 0 });
  gsap.set(meter, { scaleX: 0.3 });
  log.textContent = 'cleaned up audio';
});
</script>
</body>
</html>
