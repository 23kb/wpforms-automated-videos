<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>dragFieldToForm(fieldSlug) — QC</title>
<link rel="stylesheet" href="/videos/_qc-interactions/_shell.css">
</head>
<body>

<div class="header">
  <h1>dragFieldToForm(fieldSlug)</h1>
  <div class="desc">
    Cursor glides to a field button in the left palette, presses, carries a ghost element to the form canvas, releases, and the new field is appended to <code>.wpforms-field-wrap</code>. DOM-only — no snapshot swap.
    Source: <a href="/videos/_shared/wpforms-interactions.js">wpforms-interactions.js</a> · <a href="index.html">← back to index</a>
  </div>
</div>

<div class="stage-wrap">
  <div class="stage" id="stage">
    <div class="phase-label" id="phaseLabel">state: loading…</div>
  </div>
</div>

<div class="controls">
  <label style="font-size:12px; opacity:0.7; font-family:ui-monospace,monospace">field type:</label>
  <select id="fieldPicker">
    <option value="text">text — Single Line Text</option>
    <option value="email">email — Email</option>
    <option value="textarea">textarea — Paragraph Text</option>
    <option value="select">select — Dropdown</option>
    <option value="number">number — Numbers</option>
    <option value="phone">phone — Phone</option>
    <option value="address">address — Address</option>
    <option value="date-time">date-time — Date / Time</option>
  </select>
  <button id="runBtn" class="primary">▶ drag field to canvas</button>
  <button id="resetBtn">⟲ reset</button>
  <span class="time" id="timeLabel">…</span>
</div>

<script src="/vendor/gsap/3.15.0/gsap.min.js"></script>
<script type="module">
import { bootQc } from '/videos/_qc-interactions/_shell.js';

bootQc({
  startSnapshot: 'builder-fields',
  cursorStart: { x: 1180, y: 660 },
  run: async ({ interactions, setState }) => {
    const slug = document.getElementById('fieldPicker').value;
    setState(`dragFieldToForm("${slug}")`);
    await interactions.dragFieldToForm(slug);
  },
});
</script>
</body>
</html>
