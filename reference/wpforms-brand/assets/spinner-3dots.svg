<!-- WPForms AI 3-dot chat spinner. Canonical source: getSpinnerSvg() in wpforms-ai-chat-element.min.js (live plugin). Reproduced here as a static SVG. Use inside .wpforms-chat-item-answer-waiting > .wpforms-chat-item-spinner. -->
<svg class="wpforms-ai-chat-spinner-dots" width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <style>
    .spinner_S1WN { animation: spinner_MGfb .8s linear infinite; animation-delay: -.8s; fill: currentColor; }
    .spinner_Km9P { animation-delay: -.65s; }
    .spinner_JApP { animation-delay: -.5s; }
    @keyframes spinner_MGfb { 93.75%, 100% { opacity: .2; } }
  </style>
  <circle class="spinner_S1WN" cx="4" cy="12" r="3"></circle>
  <circle class="spinner_S1WN spinner_Km9P" cx="12" cy="12" r="3"></circle>
  <circle class="spinner_S1WN spinner_JApP" cx="20" cy="12" r="3"></circle>
</svg>
