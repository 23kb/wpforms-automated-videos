<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>WPForms Video Player QC Host</title>
<link rel="stylesheet" href="/runtime/player.css">
<style>
  html, body { margin: 0; background: #000; overflow: hidden; }
  #boot-error { position: fixed; inset: 0; display: flex; align-items: center;
                justify-content: center; z-index: 3000; color: #ff7b72;
                font: 500 14px/1.5 -apple-system, 'Segoe UI', sans-serif;
                padding: 40px; text-align: center; background: #000; }
</style>
<script>
(() => {
  const native = {
    setTimeout: window.setTimeout.bind(window),
    clearTimeout: window.clearTimeout.bind(window),
    requestAnimationFrame: window.requestAnimationFrame.bind(window),
    cancelAnimationFrame: window.cancelAnimationFrame.bind(window),
    Audio: window.Audio,
  };

  let paused = false;
  let started = false;
  let elapsed = 0;
  let lastTick = performance.now();
  let nextTimerId = 1;
  let nextRafId = 1;
  let timeScale = 1;
  let seeking = false;
  let seekTarget = 0;
  let initialSeekTarget = Number(new URLSearchParams(location.search).get('seek') || 0);
  const timers = new Map();
  const rafs = new Map();
  const trackedMedia = new Set();

  function post(type, data = {}) {
    parent?.postMessage({ source: 'wpf-qc-host', type, ...data }, '*');
  }

  function tickClock(now) {
    if (started && !paused) elapsed += (Math.max(0, now - lastTick) / 1000) * timeScale;
    lastTick = now;
    if (seeking && elapsed >= seekTarget) finishSeek();
    post('progress', { elapsed, paused, seeking, done: !!document.body?.dataset.sceneDone });
    native.requestAnimationFrame(tickClock);
  }
  native.requestAnimationFrame(tickClock);

  window.setTimeout = (cb, delay = 0, ...args) => {
    const id = nextTimerId++;
    const timer = {
      cb,
      args,
      delay: Math.max(0, Number(delay) || 0),
      remaining: Math.max(0, Number(delay) || 0),
      start: performance.now(),
      nativeId: null,
    };
    const run = () => {
      timers.delete(id);
      cb(...args);
    };
    timer.run = run;
    if (!paused) timer.nativeId = native.setTimeout(run, timer.remaining / timeScale);
    timers.set(id, timer);
    return id;
  };

  window.clearTimeout = (id) => {
    const timer = timers.get(id);
    if (timer?.nativeId) native.clearTimeout(timer.nativeId);
    timers.delete(id);
  };

  window.requestAnimationFrame = (cb) => {
    const id = nextRafId++;
    const run = (ts) => {
      rafs.delete(id);
      cb(ts);
    };
    const entry = { cb, nativeId: null, run };
    if (!paused) entry.nativeId = native.requestAnimationFrame(run);
    rafs.set(id, entry);
    return id;
  };

  window.cancelAnimationFrame = (id) => {
    const entry = rafs.get(id);
    if (entry?.nativeId) native.cancelAnimationFrame(entry.nativeId);
    rafs.delete(id);
  };

  window.Audio = function(...args) {
    const media = new native.Audio(...args);
    trackedMedia.add(media);
    media.addEventListener('ended', () => trackedMedia.delete(media), { once: true });
    return media;
  };
  window.Audio.prototype = native.Audio.prototype;

  function allMedia() {
    return new Set([...trackedMedia, ...document.querySelectorAll('audio,video')]);
  }

  function muteForSeek(on) {
    allMedia().forEach((media) => {
      if (on) {
        if (media.__qcMutedBeforeSeek === undefined) media.__qcMutedBeforeSeek = media.muted;
        media.muted = true;
      } else if (media.__qcMutedBeforeSeek !== undefined) {
        media.muted = media.__qcMutedBeforeSeek;
        delete media.__qcMutedBeforeSeek;
      }
    });
  }

  function applyTimeScale(nextScale) {
    const now = performance.now();
    timers.forEach((timer) => {
      if (timer.nativeId) {
        native.clearTimeout(timer.nativeId);
        timer.nativeId = null;
        timer.remaining = Math.max(0, timer.remaining - ((now - timer.start) * timeScale));
      }
      if (!paused) {
        timer.start = now;
        timer.nativeId = native.setTimeout(timer.run, timer.remaining / nextScale);
      }
    });
    timeScale = nextScale;
    try { window.gsap?.globalTimeline?.timeScale?.(nextScale); } catch {}
    allMedia().forEach((media) => {
      try { media.playbackRate = Math.min(16, Math.max(0.25, nextScale)); } catch {}
    });
  }

  function pauseMedia() {
    allMedia().forEach((media) => {
      if (!media.paused) {
        media.__qcWasPlaying = true;
        media.pause();
      }
    });
  }

  function resumeMedia() {
    allMedia().forEach((media) => {
      if (media.__qcWasPlaying) {
        media.__qcWasPlaying = false;
        media.play?.().catch(() => {});
      }
    });
  }

  function setCssPaused(on) {
    let style = document.getElementById('qc-pause-style');
    if (on && !style) {
      style = document.createElement('style');
      style.id = 'qc-pause-style';
      style.textContent = '*,*::before,*::after{animation-play-state:paused!important}';
      document.head.appendChild(style);
    } else if (!on) {
      style?.remove();
    }
  }

  function pause() {
    if (paused) return;
    paused = true;
    const now = performance.now();
    timers.forEach((timer) => {
      if (timer.nativeId) {
        native.clearTimeout(timer.nativeId);
        timer.nativeId = null;
        timer.remaining = Math.max(0, timer.remaining - (now - timer.start));
      }
    });
    rafs.forEach((entry) => {
      if (entry.nativeId) {
        native.cancelAnimationFrame(entry.nativeId);
        entry.nativeId = null;
      }
    });
    pauseMedia();
    setCssPaused(true);
    post('paused', { elapsed, seeking });
  }

  function resume() {
    if (!paused) return;
    paused = false;
    lastTick = performance.now();
    timers.forEach((timer) => {
      if (!timer.nativeId) {
        timer.start = performance.now();
        timer.nativeId = native.setTimeout(timer.run, timer.remaining / timeScale);
      }
    });
    rafs.forEach((entry) => {
      if (!entry.nativeId) entry.nativeId = native.requestAnimationFrame(entry.run);
    });
    setCssPaused(false);
    resumeMedia();
    post('resumed', { elapsed, seeking });
  }

  function finishSeek() {
    seeking = false;
    elapsed = seekTarget;
    applyTimeScale(1);
    muteForSeek(false);
    pause();
    post('seeked', { elapsed });
  }

  function seekTo(target) {
    target = Math.max(0, Number(target) || 0);
    if (!started) {
      initialSeekTarget = target;
      post('seek-waiting', { target });
      return;
    }
    if (target <= elapsed + 0.15) {
      post('seek-reload', { target });
      return;
    }
    seekTarget = target;
    seeking = true;
    muteForSeek(true);
    if (paused) resume();
    applyTimeScale(24);
    post('seeking', { target, elapsed });
  }

  window.__qcVideo = {
    pause,
    resume,
    toggle() { paused ? resume() : pause(); },
    markStarted() {
      started = true;
      elapsed = 0;
      lastTick = performance.now();
      post('started', { elapsed });
      if (initialSeekTarget > 0) {
        const target = initialSeekTarget;
        initialSeekTarget = 0;
        setTimeout(() => seekTo(target), 80);
      }
    },
    getState() {
      const media = [...allMedia()];
      return {
        elapsed,
        paused,
        started,
        mediaCount: media.length,
        playingMedia: media.filter(m => !m.paused).length,
        timeScale,
        seeking,
      };
    },
  };

  window.addEventListener('message', (event) => {
    const data = event.data || {};
    if (data.source !== 'wpf-qc-runner') return;
    if (data.cmd === 'pause') pause();
    if (data.cmd === 'resume') resume();
    if (data.cmd === 'toggle') window.__qcVideo.toggle();
    if (data.cmd === 'seek') seekTo(data.target);
    if (data.cmd === 'state') post('progress', { elapsed, paused, done: !!document.body?.dataset.sceneDone });
  });
})();
</script>
</head>
<body>
<script type="module">
import { isChapterDescriptor } from '/runtime/chapter-api.js';

const params = new URLSearchParams(location.search);
const slug = params.get('video');
if (!slug) {
  document.body.innerHTML = '<pre style="padding:40px;font:14px monospace;color:#fff">Missing ?video=&lt;slug&gt;</pre>';
  throw new Error('no video slug');
}
document.title = 'WPForms QC — ' + slug;

function bootError(msg) {
  const d = document.createElement('div');
  d.id = 'boot-error';
  d.textContent = msg;
  document.body.appendChild(d);
  console.error(msg);
}

document.addEventListener('click', () => {
  window.__qcVideo?.markStarted();
}, { once: true, capture: true });

(async () => {
  try {
    const manifestUrl = '/videos/' + slug + '/manifest.json';
    const r = await fetch(manifestUrl);
    if (!r.ok) throw new Error('manifest HTTP ' + r.status);
    const manifest = await r.json();
    if (!Array.isArray(manifest.chapters)) {
      throw new Error('manifest.chapters must be an array');
    }
    const qcChapter = params.get('chapter');
    if (qcChapter) {
      const wanted = qcChapter.split(',').map(s => s.trim()).filter(Boolean);
      const trimmed = manifest.chapters.filter(name => wanted.includes(name));
      if (trimmed.length) {
        manifest.chapters = trimmed;
        manifest.intro = null;
        manifest.postIntro = null;
        manifest.teaser = null;
        manifest.outro = null;
      }
    }
    if (manifest.chapters.length === 0) {
      if (!manifest.outro && !manifest.intro) {
        throw new Error('manifest has no chapters, intro, or outro');
      }
      const { playVideo } = await import('/runtime/player.js');
      await playVideo(slug);
      return;
    }
    const mods = await Promise.all(
      manifest.chapters.map((name) => import('/videos/' + slug + '/chapters/' + name + '.js'))
    );
    const allDescriptors = mods.every(m => isChapterDescriptor(m.default));
    if (allDescriptors) {
      const { runChain } = await import('/runtime/chapter-runner.js');
      await runChain(mods.map(m => m.default), {
        label: 'Start', video: slug, manifest,
      });
      document.body.dataset.sceneDone = 'true';
    } else {
      const { playVideo } = await import('/runtime/player.js');
      await playVideo(slug);
      document.body.dataset.sceneDone = 'true';
    }
  } catch (err) {
    bootError('playVideo failed: ' + (err?.message || err));
    console.error(err);
  }
})();
</script>
</body>
</html>
