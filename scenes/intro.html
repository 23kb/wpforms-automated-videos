<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Intro — Form Notifications</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
<style>
  :root {
    --bg-cream:#fdf6ec; --bg-warm:#fff7ec;
    --ink:#1e1410; --ink-2:#4c3a32;
    --brand:#E27730; --brand-deep:#c96320; --amber:#f0a040; --teal:#2a8a7c;
  }
  html, body { margin:0; padding:0; background:#fbf4e3; overflow:hidden;
               font-family:'Inter',-apple-system,sans-serif; color:var(--ink); }

  /* ── Background: warm cream base + radial vignette ─────────────────── */
  .bg-base {
    position:fixed; inset:0; z-index:0;
    background:radial-gradient(ellipse at 50% 45%, #fcf6e7 0%, #f6edd4 70%, #eadfc0 100%);
  }
  .bg-vignette {
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(ellipse at 50% 55%, transparent 40%, rgba(110,70,15,0.12) 100%);
  }

  /* Ambient particle canvas (drifting warm dust) */
  #dust { position:fixed; inset:0; z-index:2; pointer-events:none; opacity:0; }

  /* Soft horizontal light sweep */
  .sweep {
    position:fixed; top:0; bottom:0; width:60%; z-index:3; pointer-events:none;
    background:linear-gradient(90deg, transparent 0%, rgba(255,210,150,0.5) 45%, rgba(255,210,150,0.5) 55%, transparent 100%);
    filter:blur(40px); mix-blend-mode:screen;
    transform:translateX(-120%); opacity:0;
  }

  /* ── Main wrap (blur de-ramps from 22px to 0) ──────────────────────── */
  .wrap {
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:0 8vw;
    will-change:transform, filter;
  }

  .logo-stage {
    width:240px; height:170px; margin-bottom:40px;
    display:flex; align-items:center; justify-content:center;
    filter:drop-shadow(0 22px 60px rgba(226,119,48,0.32))
           drop-shadow(0 4px 12px rgba(0,0,0,0.08));
    will-change:transform, opacity, filter;
  }
  .logo-stage video { width:100%; height:100%; object-fit:contain; }

  .eyebrow-row {
    display:flex; align-items:center; gap:18px;
    margin-bottom:26px;
    will-change:opacity;
  }
  .eyebrow-bar {
    width:40px; height:1px; background:var(--brand-deep);
    transform-origin:left center; will-change:transform;
  }
  .eyebrow-bar.right { transform-origin:right center; }
  .eyebrow {
    font-family:'Inter',sans-serif; font-weight:600;
    font-size:15px; letter-spacing:0.38em; text-transform:uppercase;
    color:var(--brand-deep);
    will-change:transform, opacity;
    display:inline-block;
  }

  /* Editorial title — Instrument Serif, per-word */
  .title {
    font-family:'Instrument Serif', 'Georgia', serif;
    font-weight:400; font-style:normal;
    font-size:156px; line-height:1.02; letter-spacing:-0.025em;
    color:#14110a;
    max-width:1400px;
  }
  .title .w {
    display:inline-block; margin:0 0.14em;
    will-change:transform, opacity, filter, background-position;
    position:relative;
  }
  /* Last word italic for editorial flourish */
  .title .w.italic { font-style:italic; color:#2a1f0a; }

  /* Gradient-sweep state — words become text-clipped gradient that sweeps */
  .title .w.is-gradient {
    background:linear-gradient(90deg,
      #14110a 0%, #14110a 12%,
      #5a3215 22%, var(--brand) 38%, var(--amber) 55%, var(--teal) 72%,
      #14110a 88%, #14110a 100%);
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent;
    background-size:300% 100%;
    background-position:100% 0;
  }

  .subtitle {
    font-family:'Inter',sans-serif; font-weight:400;
    font-size:26px; line-height:1.45;
    color:var(--ink-2);
    max-width:820px; margin-top:36px;
    will-change:transform, opacity, filter;
  }
  .subtitle .accent { color:var(--brand-deep); font-weight:500; }

  /* Tiny corner meta tag (hyperframes-style chapter marker) */
  .meta {
    position:fixed; bottom:48px; left:52px; z-index:20;
    font-family:'Inter',sans-serif; font-weight:500;
    font-size:13px; letter-spacing:0.24em; text-transform:uppercase;
    color:rgba(30,20,16,0.55);
    display:flex; align-items:center; gap:14px;
    will-change:opacity;
  }
  .meta .tick { width:6px; height:6px; border-radius:50%; background:var(--brand); }
  .meta .sep { width:24px; height:1px; background:rgba(30,20,16,0.3); }

  /* ── Start gate ─────────────────────────────────────────────────────── */
  .start-gate {
    position:fixed; inset:0; z-index:950;
    display:flex; align-items:center; justify-content:center;
    background:#fbf4e3; cursor:pointer;
  }
  .start-gate .start-btn {
    padding:20px 48px; font:600 22px/1 'Inter', sans-serif;
    background:var(--brand); color:#fff; border:0; border-radius:12px;
    cursor:pointer; letter-spacing:0.03em;
    box-shadow:0 16px 44px rgba(226,119,48,0.4);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .start-gate .start-btn:hover { transform:translateY(-2px); box-shadow:0 20px 54px rgba(226,119,48,0.5); }
  .start-gate.exit { opacity:0; transition:opacity .45s ease .1s; pointer-events:none; }
</style>
</head>
<body>
  <div class="bg-base"></div>
  <canvas id="dust"></canvas>
  <div class="sweep" id="sweep"></div>
  <div class="bg-vignette"></div>

  <div class="wrap" id="wrap">
    <div class="logo-stage" id="logo">
      <video src="/assets/logo-animated.mp4" autoplay muted playsinline></video>
    </div>

    <div class="eyebrow-row">
      <div class="eyebrow-bar" id="ebar-l"></div>
      <div class="eyebrow" id="eyebrow">WPForms&nbsp;&middot;&nbsp;Tutorial</div>
      <div class="eyebrow-bar right" id="ebar-r"></div>
    </div>

    <div class="title" id="title">Form Notifications</div>

    <div class="subtitle" id="subtitle">
      Send the right email to the <span class="accent">right person</span> —
      every time your form is submitted.
    </div>
  </div>

  <div class="meta" id="meta">
    <span class="tick"></span><span>Chapter 01</span>
    <span class="sep"></span><span>Intro</span>
  </div>

  <div class="start-gate" id="gate"><button class="start-btn">▶ Start</button></div>

  <script type="module">
    import { startBGM } from './shared.js';

    // Split title per-word; mark last word italic
    const titleEl = document.getElementById('title');
    const rawWords = titleEl.textContent.trim().split(/\s+/);
    titleEl.innerHTML = rawWords.map((w,i) =>
      `<span class="w${i === rawWords.length - 1 ? ' italic' : ''}">${w}</span>`
    ).join(' ');
    const wordEls = titleEl.querySelectorAll('.w');

    const wrap     = document.getElementById('wrap');
    const logo     = document.getElementById('logo');
    const eyebrow  = document.getElementById('eyebrow');
    const ebarL    = document.getElementById('ebar-l');
    const ebarR    = document.getElementById('ebar-r');
    const subtitle = document.getElementById('subtitle');
    const meta     = document.getElementById('meta');
    const sweep    = document.getElementById('sweep');
    const dust     = document.getElementById('dust');

    // ── Ambient dust canvas ─────────────────────────────────────────────
    function initDust() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      dust.width = innerWidth * dpr;
      dust.height = innerHeight * dpr;
      dust.style.width = innerWidth + 'px';
      dust.style.height = innerHeight + 'px';
      const ctx = dust.getContext('2d');
      ctx.scale(dpr, dpr);

      const N = 70;
      const particles = Array.from({length:N}, () => ({
        x: Math.random() * innerWidth,
        y: Math.random() * innerHeight,
        r: 0.6 + Math.random() * 2.2,
        vx: (Math.random() - 0.5) * 0.15,
        vy: -0.05 - Math.random() * 0.12,
        a: 0.15 + Math.random() * 0.45,
        hue: Math.random() < 0.5 ? '255, 180, 110' : '255, 210, 160'
      }));

      function frame() {
        ctx.clearRect(0, 0, innerWidth, innerHeight);
        for (const p of particles) {
          p.x += p.vx; p.y += p.vy;
          if (p.y < -10) { p.y = innerHeight + 10; p.x = Math.random() * innerWidth; }
          if (p.x < -10) p.x = innerWidth + 10;
          if (p.x > innerWidth + 10) p.x = -10;
          ctx.beginPath();
          ctx.fillStyle = `rgba(${p.hue},${p.a})`;
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        }
        requestAnimationFrame(frame);
      }
      frame();
    }

    // ── Initial states ──────────────────────────────────────────────────
    gsap.set(wrap, { filter: 'blur(22px)', autoAlpha: 1 });
    gsap.set(logo, { opacity: 0, scale: 0.68, y: 24 });
    gsap.set([ebarL, ebarR], { scaleX: 0 });
    gsap.set(eyebrow, { opacity: 0, y: 8, letterSpacing: '0.5em' });

    // Per-word: slide in from right with velocity decay ("cut the curve")
    const slideDistances = rawWords.map((_, i) => {
      // First word far (carries momentum), subsequent words less
      return Math.max(60, 400 - i * 140);
    });
    wordEls.forEach((el, i) => {
      gsap.set(el, {
        x: slideDistances[i],
        y: 20,
        opacity: 0,
        filter: 'blur(14px)',
      });
    });

    gsap.set(subtitle, { opacity: 0, y: 18, filter: 'blur(8px)' });
    gsap.set(meta, { opacity: 0, y: 6 });

    function runScene() {
      initDust();
      gsap.to(dust, { opacity: 1, duration: 1.4, ease: 'power2.out' });

      const tl = gsap.timeline();

      // Wrap blur de-ramp (scene-wide settle)
      tl.to(wrap, {
        filter: 'blur(0px)',
        duration: 0.85, ease: 'power2.out'
      }, 0);

      // Horizontal light sweep across
      tl.fromTo(sweep,
        { x: '-120vw', opacity: 0 },
        { x: '120vw', opacity: 1, duration: 1.6, ease: 'power2.inOut',
          onComplete: () => gsap.to(sweep, { opacity: 0, duration: 0.3 }) },
        0.1);

      // Logo — spring-in with gentle y settle
      tl.to(logo, {
        opacity: 1, scale: 1, y: 0,
        duration: 1.1, ease: 'back.out(1.8)'
      }, 0.35);

      // Eyebrow bars expand outward from center
      tl.to([ebarL, ebarR], {
        scaleX: 1, duration: 0.7, ease: 'expo.out'
      }, 0.75);
      tl.to(eyebrow, {
        opacity: 1, y: 0, letterSpacing: '0.38em',
        duration: 0.8, ease: 'expo.out'
      }, 0.82);

      // Title words — each slides from right on staggered onsets with expo.out
      const wordOnsets = rawWords.map((_, i) => 1.05 + i * 0.14);
      wordEls.forEach((el, i) => {
        tl.to(el, {
          x: 0, y: 0, opacity: 1, filter: 'blur(0px)',
          duration: 0.85, ease: 'expo.out'
        }, wordOnsets[i]);
      });

      const lastWordLand = wordOnsets[wordOnsets.length - 1] + 0.35;

      // Gradient color sweep across words (after they land)
      tl.add(() => { wordEls.forEach(w => w.classList.add('is-gradient')); }, lastWordLand + 0.05);
      tl.to(wordEls, {
        backgroundPosition: '0% 0',
        duration: 0.9, ease: 'power2.out',
        stagger: 0.05
      }, lastWordLand + 0.1);

      // Scale pulse on wrap so the gradient landing feels intentional
      tl.to(wrap, { scale: 1.015, duration: 0.12, ease: 'power2.out' }, lastWordLand + 0.12);
      tl.to(wrap, { scale: 1,     duration: 0.32, ease: 'power2.inOut' }, lastWordLand + 0.24);

      // Subtitle — fades in from blur after title pulse
      tl.to(subtitle, {
        opacity: 1, y: 0, filter: 'blur(0px)',
        duration: 0.8, ease: 'power3.out'
      }, lastWordLand + 0.35);

      // Corner meta
      tl.to(meta, { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out' }, lastWordLand + 0.55);

      // Letter-spacing breath (holds the frame alive)
      tl.to(eyebrow, {
        letterSpacing: '0.42em', duration: 0.9,
        ease: 'sine.inOut', yoyo: true, repeat: 1
      }, lastWordLand + 0.7);

      // ── Hold ──────────────────────────────────────────────────────────
      tl.addLabel('holdEnd', '+=3.5');

      // ── Push-blur exit ────────────────────────────────────────────────
      // Words push up with velocity stagger, blur out
      tl.to(wordEls, {
        y: -36, x: -20, scale: 1.06, opacity: 0, filter: 'blur(16px)',
        duration: 0.6, ease: 'power2.in',
        stagger: 0.05
      }, 'holdEnd');

      tl.to([eyebrow, ebarL, ebarR, subtitle, meta], {
        y: -18, opacity: 0, filter: 'blur(8px)',
        duration: 0.5, ease: 'power2.in'
      }, 'holdEnd');

      tl.to(logo, {
        scale: 1.18, opacity: 0, filter: 'blur(8px)',
        duration: 0.65, ease: 'power2.in'
      }, 'holdEnd+=0.05');

      // Whole wrap reblur on exit
      tl.to(wrap, { filter: 'blur(18px)', duration: 0.55, ease: 'power2.in' }, 'holdEnd+=0.05');

      tl.to(dust, { opacity: 0, duration: 0.6, ease: 'power2.in' }, 'holdEnd');

      tl.call(() => { document.body.dataset.sceneDone = 'true'; });
    }

    document.getElementById('gate').addEventListener('click', (e) => {
      const gate = e.currentTarget;
      gate.classList.add('exit');
      setTimeout(() => gate.remove(), 500);
      startBGM();
      runScene();
    }, { once: true });
  </script>
</body>
</html>
