<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Zoom Quality Lab — admin-entries-list zoom into Entry email cell</title>
<style>
  html, body {
    margin: 0;
    background: #1a1a1a;
    color: #ddd;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
  }
  body {
    display: grid;
    grid-template-rows: 50px 1fr;
    height: 100vh;
  }
  header {
    background: #111;
    border-bottom: 1px solid #333;
    padding: 8px 12px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    font-size: 12px;
  }
  header button {
    background: #2a2a2a;
    color: #fff;
    border: 1px solid #444;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 12px;
    border-radius: 3px;
  }
  header button:hover { background: #3a3a3a; }
  header button.active { background: #E27730; border-color: #E27730; }
  header span.label { color: #888; margin-right: 4px; }
  #status { color: #6dffb1; font-family: monospace; font-size: 11px; margin-left: auto; }
  .stage-wrap {
    position: relative;
    overflow: hidden;
    background: #0d0d0d;
  }
  .stage {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 1280px;
    height: 720px;
    transform: translate(-50%, -50%);
    background: #F4F1EC;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  iframe.snap {
    position: absolute;
    left: 0;
    top: 0;
    width: 1280px;
    height: 720px;
    border: 0;
    transform-origin: 0 0;
    background: #F4F1EC;
  }
  .reticle {
    position: absolute;
    left: 50%; top: 50%;
    width: 22px; height: 22px;
    margin: -11px 0 0 -11px;
    border: 2px solid rgba(226, 119, 48, 0.9);
    border-radius: 999px;
    box-shadow: 0 0 0 6px rgba(226, 119, 48, 0.18);
    z-index: 100;
    pointer-events: none;
  }
</style>
</head>
<body>
<header>
  <span class="label">approach:</span>
  <button data-approach="baseline" class="active">A0 baseline (CSS transform)</button>
  <button data-approach="B-doc-zoom">B documentElement.zoom + scroll</button>
  <button data-approach="B-html-zoom-keepwidth">B html.zoom + width-lock</button>
  <button data-approach="A-resize-attrs">A iframe attr resize</button>
  <button data-approach="C-viewport-meta">C viewport meta scale</button>
  <button data-approach="J-overlay-clone">J overlay clone</button>
  <span class="label">zoom:</span>
  <button data-zoom="1">1×</button>
  <button data-zoom="2">2×</button>
  <button data-zoom="3" class="active">3×</button>
  <button data-zoom="3.8">3.8×</button>
  <button data-zoom="5">5×</button>
  <span class="label">target:</span>
  <button data-target="entry-email">Entry email cell</button>
  <button data-target="entry-name">Entry name cell</button>
  <button data-target="search-input">Search input</button>
  <span id="status">idle</span>
</header>
<div class="stage-wrap" id="wrap">
  <div class="stage" id="stage">
    <iframe class="snap" id="iframe" src="/snapshots/admin-entries-list/index.html"></iframe>
    <div class="reticle"></div>
  </div>
</div>

<script>
const STAGE_W = 1280;
const STAGE_H = 720;
const TARGETS = {
  'entry-email': "#the-list tr:nth-child(3) [data-field-type='email']",
  'entry-name': "#the-list tr:nth-child(1) [data-field-type='name']",
  'search-input': '#wpforms-entries-search-input',
};

let state = {
  approach: 'baseline',
  zoom: 3,
  target: 'entry-email',
  // popOut overlay node (cleaned up between transitions)
  overlay: null,
};

const iframe = document.getElementById('iframe');
const stage = document.getElementById('stage');
const statusEl = document.getElementById('status');

function setStatus(msg) {
  statusEl.textContent = msg;
}

function fitStage() {
  const wrap = document.getElementById('wrap');
  const sx = wrap.clientWidth / STAGE_W;
  const sy = wrap.clientHeight / STAGE_H;
  const scale = Math.min(sx, sy) * 0.96;
  stage.style.transform = `translate(-50%, -50%) scale(${scale})`;
}
window.addEventListener('resize', fitStage);

function clearOverlay() {
  if (state.overlay) {
    state.overlay.remove();
    state.overlay = null;
  }
}

function resetIframe() {
  clearOverlay();
  // Restore iframe to baseline
  iframe.style.width = STAGE_W + 'px';
  iframe.style.height = STAGE_H + 'px';
  iframe.removeAttribute('width');
  iframe.removeAttribute('height');
  iframe.style.transform = 'scale(1) translate(0px, 0px)';
  iframe.style.transformOrigin = '0 0';
  iframe.style.opacity = '1';
  try {
    const d = iframe.contentDocument;
    if (d) {
      // Strip any injected styles
      d.querySelectorAll('style[data-zoom-lab]').forEach(s => s.remove());
      if (d.documentElement) d.documentElement.style.zoom = '';
      if (d.body) d.body.style.zoom = '';
      d.defaultView?.scrollTo(0, 0);
      // Restore viewport meta if we touched it
      const meta = d.head?.querySelector('meta[name="viewport"][data-zoom-lab]');
      if (meta) meta.remove();
    }
  } catch (e) {}
}

function getTargetRect() {
  const doc = iframe.contentDocument;
  if (!doc) return null;
  const sel = TARGETS[state.target];
  const el = doc.querySelector(sel);
  if (!el) {
    setStatus('target not found: ' + sel);
    return null;
  }
  // Scroll the iframe to bring target into view (center)
  el.scrollIntoView({ block: 'center', inline: 'center', behavior: 'instant' });
  return { el, rect: el.getBoundingClientRect() };
}

// --- Approach implementations ---

function approachBaseline() {
  const hit = getTargetRect();
  if (!hit) return;
  const cx = hit.rect.left + hit.rect.width / 2;
  const cy = hit.rect.top + hit.rect.height / 2;
  const z = state.zoom;
  // Same math as IframeManager._cameraTransform with baseScale=1:
  // scale(z) translate(tx/z, ty/z)
  // We want target center to land at stage center (640, 360).
  // After scale, target center is at (cx * z, cy * z). Need translation:
  const tx = STAGE_W / 2 - cx * z;
  const ty = STAGE_H / 2 - cy * z;
  iframe.style.transformOrigin = '0 0';
  iframe.style.transform = `scale(${z}) translate(${tx / z}px, ${ty / z}px)`;
  setStatus(`baseline: scale(${z}) translate(${(tx/z).toFixed(1)}, ${(ty/z).toFixed(1)})`);
}

function approachBDocZoom() {
  const hit = getTargetRect();
  if (!hit) return;
  const doc = iframe.contentDocument;
  const win = doc.defaultView;
  const z = state.zoom;
  // Apply zoom on the iframe documentElement. This causes the iframe content
  // to re-rasterize at zoom × density. Content also lays out at zoom × size,
  // so we use the iframe scroll to bring the focused element to viewport center.
  doc.documentElement.style.zoom = String(z);
  // Get target's NEW rect after zoom. Note: getBoundingClientRect returns
  // post-zoom CSS pixels.
  const newRect = hit.el.getBoundingClientRect();
  // Scroll the iframe window so target center lands at iframe viewport center.
  const scrollX = win.scrollX + newRect.left + newRect.width / 2 - STAGE_W / 2;
  const scrollY = win.scrollY + newRect.top + newRect.height / 2 - STAGE_H / 2;
  win.scrollTo(scrollX, scrollY);
  // No outer CSS transform — iframe stays at 1:1 visual size, internal zoom does the work
  iframe.style.transform = 'scale(1) translate(0px, 0px)';
  // Report layout metrics so we can verify the page didn't get mangled.
  const wpwrap = doc.querySelector('#wpwrap');
  const wpwrapW = wpwrap ? wpwrap.getBoundingClientRect().width : 0;
  setStatus(`B doc.zoom=${z}: target rect now ${newRect.width.toFixed(0)}×${newRect.height.toFixed(0)}, #wpwrap width ${wpwrapW.toFixed(0)}`);
}

function approachBHtmlZoomKeepWidth() {
  const hit = getTargetRect();
  if (!hit) return;
  const doc = iframe.contentDocument;
  const win = doc.defaultView;
  const z = state.zoom;
  // Inject a width override that PRESERVES the WPForms admin layout. The
  // working theory: WPForms admin uses fixed-width chrome (#wpwrap), so
  // when zoom enlarges the body, the inner fixed layout still references
  // 1280px viewport. We test that by also adjusting the iframe's actual
  // attribute width: keep width attr at the same 1280, but zoom the doc.
  let styleEl = doc.head.querySelector('style[data-zoom-lab="hzkw"]');
  if (!styleEl) {
    styleEl = doc.createElement('style');
    styleEl.setAttribute('data-zoom-lab', 'hzkw');
    doc.head.appendChild(styleEl);
  }
  styleEl.textContent = `html { zoom: ${z}; }`;
  // After zoom, getBoundingClientRect of target reflects post-zoom CSS pixels.
  const newRect = hit.el.getBoundingClientRect();
  const scrollX = win.scrollX + newRect.left + newRect.width / 2 - STAGE_W / 2;
  const scrollY = win.scrollY + newRect.top + newRect.height / 2 - STAGE_H / 2;
  win.scrollTo(scrollX, scrollY);
  iframe.style.transform = 'scale(1) translate(0px, 0px)';
  const wpwrap = doc.querySelector('#wpwrap');
  const wpwrapW = wpwrap ? wpwrap.getBoundingClientRect().width : 0;
  setStatus(`B html.zoom=${z}: target now ${newRect.width.toFixed(0)}×${newRect.height.toFixed(0)}, #wpwrap width ${wpwrapW.toFixed(0)}`);
}

function approachAResizeAttrs() {
  const hit = getTargetRect();
  if (!hit) return;
  const doc = iframe.contentDocument;
  const win = doc.defaultView;
  const z = state.zoom;
  // Resize the iframe's CSS box to STAGE_W * z by STAGE_H * z. This makes the
  // browser re-layout the inner doc at the new viewport size. WPForms admin
  // is responsive at the desktop breakpoint, so 3840×2160 should look the
  // same as 1280×720 just larger. Then scale-down (transform: scale(1/z)) to
  // fit. Net visual: same area visible, but rendering at the larger viewport.
  iframe.style.width = (STAGE_W * z) + 'px';
  iframe.style.height = (STAGE_H * z) + 'px';
  // Force layout re-rasterization. We compute the scroll so target lands
  // at iframe-CSS center.
  const newRect = hit.el.getBoundingClientRect();
  const scrollX = win.scrollX + newRect.left + newRect.width / 2 - (STAGE_W * z) / 2;
  const scrollY = win.scrollY + newRect.top + newRect.height / 2 - (STAGE_H * z) / 2;
  win.scrollTo(scrollX, scrollY);
  // Outer transform: 1/z to shrink back to STAGE_W × STAGE_H visible bounds
  iframe.style.transformOrigin = '0 0';
  iframe.style.transform = `scale(${1/z}) translate(0px, 0px)`;
  // But wait — that gives ONLY 1× visual zoom of the original page. We
  // actually want to see target z× zoomed. So scroll positioning needs
  // to instead show only a 1280/z × 720/z slice of the resized iframe. Hmm.
  // Actually the math is: iframe is z× the size in CSS, scaled down by 1/z,
  // so visual = same as original at 1×. The point is the GPU now has more
  // pixels to sample — sharper text — BUT visually we see the WHOLE page,
  // not a zoom into a region.
  // For "zoom into region", we need to instead:
  //   iframe at 1280×720 CSS (visual unchanged), but rendered at z× by
  //   doc-zoom OR sub-scroll. We already have those above.
  // This approach (resize-attrs) only helps if combined with overflow-clip
  // and showing only 1280×720 of the z×-sized iframe. That requires either
  // hiding the iframe overflow OR using an outer wrapper clip.
  setStatus(`A iframe resized to ${STAGE_W*z}x${STAGE_H*z}, scrolled to (${scrollX.toFixed(0)},${scrollY.toFixed(0)})`);
}

async function approachCViewportMeta() {
  // Set meta viewport with initial-scale=N. Reload required so the new
  // viewport meta takes effect at load time.
  const z = state.zoom;
  await new Promise(resolve => {
    const onLoad = () => {
      iframe.removeEventListener('load', onLoad);
      // Inject meta viewport in re-loaded doc
      try {
        const doc = iframe.contentDocument;
        let meta = doc.head.querySelector('meta[name="viewport"]');
        if (!meta) {
          meta = doc.createElement('meta');
          meta.setAttribute('name', 'viewport');
          doc.head.insertBefore(meta, doc.head.firstChild);
        }
        meta.setAttribute('data-zoom-lab', '1');
        meta.setAttribute('content', `width=${Math.round(STAGE_W/z)}, initial-scale=${z}`);
      } catch (e) {}
      resolve();
    };
    iframe.addEventListener('load', onLoad);
    iframe.src = '/snapshots/admin-entries-list/index.html?reload=' + Date.now();
  });
  const hit = getTargetRect();
  setStatus(`C viewport meta width=${Math.round(STAGE_W/z)} initial-scale=${z}, target ${hit ? `(${hit.rect.left.toFixed(0)},${hit.rect.top.toFixed(0)})` : 'lost'}`);
}

async function approachJOverlayClone() {
  const hit = getTargetRect();
  if (!hit) return;
  const z = state.zoom;
  // Render the focused REGION into an HTML overlay positioned over the iframe.
  // We don't clone just the target element — we want the surrounding context,
  // so we capture a "view window" of size STAGE_W/z × STAGE_H/z centered on
  // the target, then render it z× larger in the parent doc.
  const doc = iframe.contentDocument;
  const cx = hit.rect.left + hit.rect.width / 2;
  const cy = hit.rect.top + hit.rect.height / 2;
  // Window in iframe-CSS coords
  const winW = STAGE_W / z;
  const winH = STAGE_H / z;
  const left = cx - winW / 2;
  const top = cy - winH / 2;
  // Clone the entire document body, position it absolutely, scale it z×, then
  // use overflow:hidden + translate to show only the window.
  clearOverlay();
  const wrapper = document.createElement('div');
  Object.assign(wrapper.style, {
    position: 'absolute',
    left: '0', top: '0',
    width: STAGE_W + 'px',
    height: STAGE_H + 'px',
    overflow: 'hidden',
    zIndex: '50',
    background: '#F4F1EC',
  });
  const inner = document.createElement('div');
  Object.assign(inner.style, {
    position: 'absolute',
    left: '0', top: '0',
    width: doc.body.scrollWidth + 'px',
    height: doc.body.scrollHeight + 'px',
    transformOrigin: '0 0',
    transform: `scale(${z}) translate(${-left}px, ${-top}px)`,
  });
  // Inline-clone all stylesheets + body content. We can't just use HTML
  // because external stylesheets won't load — but admin-entries-list has
  // its CSS all inlined in <style> tags. Lucky.
  inner.innerHTML = doc.body.innerHTML;
  // Copy <head> styles into inner so CSS still applies
  const styles = Array.from(doc.head.querySelectorAll('style, link[rel="stylesheet"]'))
    .map(n => n.outerHTML).join('\n');
  inner.innerHTML = styles + inner.innerHTML;
  wrapper.appendChild(inner);
  stage.appendChild(wrapper);
  state.overlay = wrapper;
  // Hide the underlying iframe so it doesn't bleed through
  iframe.style.opacity = '0';
  setStatus(`J overlay clone: window ${winW.toFixed(0)}x${winH.toFixed(0)} at (${left.toFixed(0)},${top.toFixed(0)}), scale ${z}`);
}

async function applyApproach() {
  resetIframe();
  await new Promise(r => setTimeout(r, 50));
  const a = state.approach;
  if (a === 'baseline') approachBaseline();
  else if (a === 'B-doc-zoom') approachBDocZoom();
  else if (a === 'B-html-zoom-keepwidth') approachBHtmlZoomKeepWidth();
  else if (a === 'A-resize-attrs') approachAResizeAttrs();
  else if (a === 'C-viewport-meta') await approachCViewportMeta();
  else if (a === 'J-overlay-clone') await approachJOverlayClone();
}

document.querySelectorAll('header button').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.approach) {
      state.approach = btn.dataset.approach;
      document.querySelectorAll('button[data-approach]').forEach(b => b.classList.toggle('active', b === btn));
    }
    if (btn.dataset.zoom) {
      state.zoom = parseFloat(btn.dataset.zoom);
      document.querySelectorAll('button[data-zoom]').forEach(b => b.classList.toggle('active', b === btn));
    }
    if (btn.dataset.target) {
      state.target = btn.dataset.target;
      document.querySelectorAll('button[data-target]').forEach(b => b.classList.toggle('active', b === btn));
    }
    applyApproach();
  });
});

iframe.addEventListener('load', () => {
  fitStage();
  setTimeout(() => {
    setStatus('iframe loaded');
    applyApproach();
  }, 500);
});
</script>
</body>
</html>
